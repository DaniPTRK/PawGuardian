spring:
  application:
    name: project
  datasource:
    url: jdbc:postgresql://localhost:5433/pawguardian
    username: pawguardian
    password: pawguardian
  jpa:
    properties:
      hibernate:
        default_schema: project
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: true
        ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    table: project_schema_version
    baseline-version: 0
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

vars:
  security:
    enable: true

server:
  port: 8090

token:
  ttl: 3600000
  secret: "https://www.youtube.com/watch?v=v-WC2Y6SyrU"

admin:
  username: admin
  email: admin@admin.com
  password: admin



